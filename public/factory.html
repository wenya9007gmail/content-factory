async function apiCall(endpoint, body) {
  if (!IS_HOSTED) return { error: '忙聹卢氓聹掳忙篓隆氓录聫盲赂聧忙聰炉忙聦聛忙颅陇氓聤聼猫聝陆茂录聦猫炉路猫庐驴茅聴庐莽潞驴盲赂聤莽聣聢忙聹卢' };
  try {
    const res = await fetch(`/api/${endpoint}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return res.json();
  } catch (e) { return { error: e.message || '莽陆聭莽禄聹茅聰聶猫炉炉' }; }
}

async function checkUsage(sessionId) {

}

}

}

}

    if (!IS_HOSTED) {
      onAuth({ type: 'owner', code: code.trim() });
      return;
    }
    const res = await verifyAuth(code.trim());
    setLoading(false);
    if (res.valid) { saveAuth({ type: res.type, code: code.trim() }); onAuth({ type: res.type, code: code.trim() }); }
    else setError(res.message || '忙聨聢忙聺聝莽聽聛忙聴聽忙聲聢');
  }

          <span style={{color:'#94a3b8',fontSize:13}}>忙聢聳猫聙聟</span>
          <hr style={{flex:1,border:'none',borderTop:'1px solid #e2e8f0'}}/>
        </div>
        <button className="btn-secondary" onClick={handleGuest}
          style={{width:'100%',padding:'10px',borderRadius:8,fontSize:14}}>
          氓聟聧猫麓鹿盲陆聯茅陋聦茂录聢{GUEST_LIMIT} 忙卢隆茂录聣
        </button>

        </p>

    </div>
  );
}

  const [platform, setPlatform] = useState('wechat');
  const [keyword, setKeyword] = useState('');
  const [period, setPeriod] = useState(7);
  const [sort, setSort] = useState('comment_descending');
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [error, setError] = useState('');
  const [savedKeywords, setSavedKeywords] = useState(loadMonitorKeywords);
  const [page, setPage] = useState(1);

  async function handleSearch(kw = keyword, pg = 1) {
    if (!kw.trim()) { setError('猫炉路猫戮聯氓聟楼氓聟鲁茅聰庐猫炉聧'); return; }
    if (!IS_HOSTED) { setError('忙聹卢氓聹掳忙篓隆氓录聫盲赂聧忙聰炉忙聦聛忙颅陇氓聤聼猫聝陆'); return; }

    // Usage check for guests
    if (auth.type === 'guest') {
      const check = await checkUsage(getSessionId());
      if (!check.allowed) { setError('氓聟聧猫麓鹿忙卢隆忙聲掳氓路虏莽聰篓氓庐聦茂录聦猫炉路猫聨路氓聫聳忙聨聢忙聺聝莽聽聛'); return; }
    }

    setLoading(true); setError(''); setPage(pg);
    const opts = platform === 'wechat' ? { page: pg, period } : { page: pg, sort };
    const res = await searchMonitor(platform, kw.trim(), opts);
    setLoading(false);
    if (res.error) { setError(res.error); return; }

    setResults(res);
    if (auth.type === 'guest') {
      onUsed();
      await recordUsage(getSessionId(), false, 'monitor');
    }

    // Auto-save keyword
    if (!savedKeywords.includes(kw.trim())) {
      const updated = [kw.trim(), ...savedKeywords].slice(0, 20);
      setSavedKeywords(updated);
      saveMonitorKeywords(updated);
    }
  }

  function removeKeyword(kw) {
    const updated = savedKeywords.filter(k => k !== kw);
    setSavedKeywords(updated);
    saveMonitorKeywords(updated);
  }

    navigator.clipboard?.writeText(text).catch(() => {});

      <div className="card" style={{padding:20,marginBottom:16}}>

            冒聼聯掳 氓戮庐盲驴隆氓聟卢盲录聴氓聫路
          </div>
          <div className="platform-tab" onClick={()=>setPlatform('xhs')} style={{...platform==='xhs'?{background:'#ff2442',color:'#fff'}:{color:'#64748b'}}}>
            冒聼聯卤 氓掳聫莽潞垄盲鹿娄
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input className="input-base" style={{flex:1,minWidth:200}} placeholder="猫戮聯氓聟楼氓聟鲁茅聰庐猫炉聧茂录聦氓娄聜茂录職氓聣炉盲赂職猫碌職茅聮卤茫聙聛氓聛楼猫潞芦氓聡聫猫聜楼..."
            value={keyword} onChange={e=>setKeyword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSearch()} />
          {platform === 'wechat' ? (
            <select className="input-base" style={{width:120}} value={period} onChange={e=>setPeriod(Number(e.target.value))}>
              <option value={1}>猫驴聭1氓陇漏</option>
              <option value={3}>猫驴聭3氓陇漏</option>
              <option value={7}>猫驴聭7氓陇漏</option>
              <option value={30}>猫驴聭30氓陇漏</option>
            </select>
          ) : (
            <select className="input-base" style={{width:150}} value={sort} onChange={e=>setSort(e.target.value)}>
              <option value="comment_descending">忙聦聣猫炉聞猫庐潞忙聨聮氓潞聫</option>
              <option value="likes_descending">忙聦聣莽聜鹿猫碌聻忙聨聮氓潞聫</option>
              <option value="time_descending">忙聦聣忙聴露茅聴麓忙聨聮氓潞聫</option>
            </select>
          )}
          <button className="btn-primary" onClick={()=>handleSearch()} disabled={loading}
            style={{padding:'8px 20px',borderRadius:8,fontWeight:600,minWidth:80}}>
            {loading ? <span className="spinner"/> : '冒聼聰聧 忙聬聹莽麓垄'}
          </button>
        </div>
        {error && <p style={{color:'#ef4444',fontSize:13,marginTop:8}}>{error}</p>}
      </div>

      {/* Saved Keywords */}
      {savedKeywords.length > 0 && (
        <div style={{marginBottom:16,display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}}>
          <span style={{color:'#64748b',fontSize:13,marginRight:4}}>氓聨聠氓聫虏氓聟鲁茅聰庐猫炉聧茂录職</span>
          {savedKeywords.map(kw => (
            <span key={kw} style={{background:'#f1f5f9',border:'1.5px solid #e2e8f0',borderRadius:999,padding:'3px 10px',fontSize:13,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4}}
              onClick={()=>{setKeyword(kw);handleSearch(kw);}}>
              {kw}
              <span onClick={e=>{e.stopPropagation();removeKeyword(kw);}} style={{color:'#94a3b8',fontSize:11}}>芒聹聲</span>
            </span>
          ))}
        </div>
      )}

      {/* Results */}

        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

            </span>
            {results.total_page > 1 && (
              <div style={{display:'flex',gap:6}}>
                <button className="btn-secondary" style={{padding:'4px 12px',borderRadius:6,fontSize:13}} disabled={page<=1}
                  onClick={()=>handleSearch(keyword,page-1)}>盲赂聤盲赂聙茅隆碌</button>
                <button className="btn-secondary" style={{padding:'4px 12px',borderRadius:6,fontSize:13}} disabled={page>=results.total_page}
                  onClick={()=>handleSearch(keyword,page+1)}>盲赂聥盲赂聙茅隆碌</button>
              </div>
            )}
          </div>

          {platform === 'wechat' ? (
            results.items?.map((item, i) => (
              <div key={item.id||i} className="article-card">
                <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  {item.avatar && <img src={item.avatar} alt="" style={{width:36,height:36,borderRadius:18,objectFit:'cover',flexShrink:0}} onError={e=>e.target.style.display='none'}/>}

                    {item.content && <p style={{color:'#64748b',fontSize:13,margin:'0 0 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.content}</p>}
                    <div style={{display:'flex',flexWrap:'wrap',gap:16,fontSize:12,color:'#94a3b8'}}>
                      <span>冒聼聯掳 {item.wx_name}</span>
                      {item.read > 0 && <span>冒聼聭聛 {item.read >= 10000 ? (item.read/10000).toFixed(1)+'w' : item.read}</span>}
                      {item.praise > 0 && <span>冒聼聭聧 {item.praise}</span>}
                      {item.looking > 0 && <span>冒聼聮卢 {item.looking}</span>}
                      {item.publish_time_str && <span>冒聼聯聟 {item.publish_time_str}</span>}
                      {item.ip_wording && <span>冒聼聯聧 {item.ip_wording}</span>}
                    </div>
                  </div>
                  <button className="btn-secondary" style={{padding:'4px 10px',borderRadius:6,fontSize:12,flexShrink:0}}
                    onClick={()=>copyText(item.title)}>氓陇聧氓聢露忙聽聡茅垄聵</button>
                </div>
              </div>
            ))
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
              {results.items?.map((item, i) => (
                <div key={item.id||i} className="article-card" style={{cursor:'pointer'}}
                  onClick={()=>item.url&&window.open(item.url,'_blank')}>
                  {item.cover_url && (
                    <div style={{width:'100%',height:160,borderRadius:8,overflow:'hidden',marginBottom:10}}>
                      <img src={item.cover_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
                    </div>
                  )}
                  <div style={{fontWeight:600,fontSize:14,marginBottom:6,color:'#1e293b',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{item.title||item.desc}</div>
                  {item.desc && item.title && <p style={{color:'#64748b',fontSize:12,marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.desc}</p>}
                  <div style={{display:'flex',gap:12,fontSize:12,color:'#94a3b8',flexWrap:'wrap'}}>
                    {item.liked_count > 0 && <span>芒聺陇茂赂聫 {item.liked_count >= 10000 ? (item.liked_count/10000).toFixed(1)+'w' : item.liked_count}</span>}
                    {item.comments_count > 0 && <span>冒聼聮卢 {item.comments_count}</span>}
                    {item.collected_count > 0 && <span>芒颅聬 {item.collected_count}</span>}
                    {item.shared_count > 0 && <span>芒聠聴 {item.shared_count}</span>}
                  </div>
                  <div style={{marginTop:8,display:'flex',alignItems:'center',gap:6}}>
                    {item.user_avatar && <img src={item.user_avatar} alt="" style={{width:20,height:20,borderRadius:10,objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>}
                    <span style={{fontSize:12,color:'#64748b'}}>{item.user_nickname}</span>
                  </div>
                  <button className="btn-secondary" style={{marginTop:8,padding:'4px 10px',borderRadius:6,fontSize:12,width:'100%'}}
                    onClick={e=>{e.stopPropagation();copyText(item.title||item.desc);}}>氓陇聧氓聢露忙聽聡茅垄聵</button>
                </div>
              ))}
            </div>
          )}

          {results.items?.length === 0 && (
            <div style={{textAlign:'center',color:'#94a3b8',padding:48}}>
              <div style={{fontSize:48,marginBottom:12}}>冒聼聰聧</div>
              <p>忙聹陋忙聣戮氓聢掳莽聸赂氓聟鲁氓聠聟氓庐鹿茂录聦忙聧垄盲赂陋氓聟鲁茅聰庐猫炉聧猫炉聲猫炉聲</p>
            </div>
          )}
        </div>
      )}

      {!results && !loading && (
        <div className="card" style={{padding:48,textAlign:'center'}}>
          <div style={{fontSize:56,marginBottom:16}}>冒聼聯隆</div>
          <p style={{color:'#64748b',fontSize:16}}>猫戮聯氓聟楼氓聟鲁茅聰庐猫炉聧茂录聦莽聸聭忙聨搂氓戮庐盲驴隆氓聮聦氓掳聫莽潞垄盲鹿娄莽職聞莽聝颅茅聴篓氓聠聟氓庐鹿</p>
          <p style={{color:'#94a3b8',fontSize:13,marginTop:8}}>氓聫聭莽聨掳莽聢聠忙卢戮茅聙聣茅垄聵茂录聦氓聤漏氓聤聸氓聠聟氓庐鹿氓聢聸盲陆聹</p>
        </div>
      )}
    </div>
  );
}

//  WeChat Publish Modal
// 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function WechatPublishModal({ content, onClose }) {
  const [accounts, setAccounts] = useState([]);
  const [loadingAccounts, setLoadingAccounts] = useState(true);
  const [selectedAccount, setSelectedAccount] = useState('');
  const [title, setTitle] = useState(content?.title || '');
  const [summary, setSummary] = useState(content?.summary || '');
  const [coverImage, setCoverImage] = useState(content?.coverImage || '');
  const [articleType, setArticleType] = useState('news');
  const [author, setAuthor] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  useEffect(()=>{
    async function fetchAccounts() {
      const res = await getWechatAccounts();
      setLoadingAccounts(false);
      if (res.ok) { setAccounts(res.accounts || []); if(res.accounts?.length>0) setSelectedAccount(res.accounts[0].appid); }
      else setError(res.error || '猫聨路氓聫聳氓聟卢盲录聴氓聫路氓陇卤猫麓楼');
    }
    if (IS_HOSTED) fetchAccounts();
    else { setLoadingAccounts(false); setError('忙聹卢氓聹掳忙篓隆氓录聫盲赂聧忙聰炉忙聦聛氓聫聭氓赂聝'); }
  }, []);

  async function handlePublish() {
    if (!selectedAccount) { setError('猫炉路茅聙聣忙聥漏氓聟卢盲录聴氓聫路'); return; }
    if (!title.trim()) { setError('猫炉路氓隆芦氓聠聶忙聽聡茅垄聵'); return; }
    setLoading(true); setError('');
    const res = await publishToWechat({
      wechatAppid: selectedAccount, title: title.trim(),
      content: content?.html || content?.text || title,
      summary: summary.trim(), coverImage: coverImage.trim(),
      author: author.trim(), articleType
    });
    setLoading(false);
    if (res.ok) setResult(res);
    else setError(res.error || '氓聫聭氓赂聝氓陇卤猫麓楼');
  }

function TopicsPage() {
  const [topics, setTopics] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cf_topics')||'[]')}catch{return []} });
  const [input, setInput] = useState('');
  const [tag, setTag] = useState('');
  function add() {
    if (!input.trim()) return;
    const updated = [{id:Date.now(),text:input.trim(),tag:tag.trim(),date:new Date().toLocaleDateString('zh-CN'),used:false},...topics];
    setTopics(updated); localStorage.setItem('cf_topics',JSON.stringify(updated));
    setInput(''); setTag('');
  }
  function toggle(id) {
    const updated = topics.map(t=>t.id===id?{...t,used:!t.used}:t);
    setTopics(updated); localStorage.setItem('cf_topics',JSON.stringify(updated));
  }
  function del(id) {
    const updated = topics.filter(t=>t.id!==id);
    setTopics(updated); localStorage.setItem('cf_topics',JSON.stringify(updated));
  }
  return (
    <div style={{padding:24,maxWidth:900,margin:'0 auto'}}>
      <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>冒聼聮隆 茅聙聣茅垄聵氓潞聯</h2>
      <p style={{color:'#64748b',fontSize:14,marginBottom:20}}>忙聰露茅聸聠氓聮聦莽庐隆莽聬聠氓聠聟氓庐鹿氓聢聸盲陆聹茅聙聣茅垄聵</p>
      <div className="card" style={{padding:20,marginBottom:20}}>
        <div style={{display:'flex',gap:8}}>
          <input className="input-base" style={{flex:2}} value={input} onChange={e=>setInput(e.target.value)} placeholder="猫戮聯氓聟楼茅聙聣茅垄聵忙聝鲁忙鲁聲..." onKeyDown={e=>e.key==='Enter'&&add()} />
          <input className="input-base" style={{flex:1}} value={tag} onChange={e=>setTag(e.target.value)} placeholder="忙聽聡莽颅戮茂录聢氓聫炉茅聙聣茂录聣" />
          <button className="btn-primary" onClick={add} style={{padding:'8px 20px',borderRadius:8,fontWeight:600,whiteSpace:'nowrap'}}>+ 忙路禄氓聤聽</button>
        </div>
      </div>
      <div>
        {topics.length === 0 ? (
          <div className="card" style={{padding:48,textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>冒聼聮隆</div>
            <p style={{color:'#64748b'}}>茅聙聣茅垄聵氓潞聯盲赂潞莽漏潞茂录聦氓录聙氓搂聥忙路禄氓聤聽盲陆聽莽職聞氓聢聸盲陆聹莽聛碌忙聞聼</p>
          </div>
        ) : topics.map(t=>(
          <div key={t.id} className="card" style={{padding:14,marginBottom:8,display:'flex',alignItems:'center',gap:12,opacity:t.used?.6:1}}>
            <input type="checkbox" checked={t.used} onChange={()=>toggle(t.id)} style={{width:18,height:18,cursor:'pointer'}} />
            <div style={{flex:1}}>
              <span style={{fontSize:15,textDecoration:t.used?'line-through':'none',color:t.used?'#94a3b8':'#1e293b'}}>{t.text}</span>
              {t.tag && <span className="tag" style={{background:'#f1f5f9',color:'#6366f1',marginLeft:8}}>{t.tag}</span>}
              <span style={{fontSize:12,color:'#94a3b8',marginLeft:8}}>{t.date}</span>
            </div>
            <button onClick={()=>del(t.id)} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:16}}>芒聹聲</button>
          </div>
        ))}
      </div>
    </div>
  );
}

//  Main App
// 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function App() {
  const [auth, setAuth] = useState(()=>IS_HOSTED ? loadAuth() : {type:'owner',code:'local'});
  const [page, setPage] = useState('home');
  const [usage, setUsage] = useState({ used: 0, limit: GUEST_LIMIT });
  const [showAuthGate, setShowAuthGate] = useState(false);

  // Load usage on mount for guests
  useEffect(()=>{
    if (!auth) return;
    if (auth.type === 'guest' && IS_HOSTED) {
      checkUsage(getSessionId()).then(res=>{
        if (res.used !== undefined) setUsage({ used: res.used, limit: GUEST_LIMIT });
      });
    }
  }, [auth]);

  function handleAuth(newAuth) {
    setAuth(newAuth);
    setShowAuthGate(false);
    if (newAuth.type !== 'guest') setUsage({ used: 0, limit: -1 });
  }
  function handleLogout() { saveAuth(null); setAuth(null); setShowAuthGate(false); }
  function handleUsed() { setUsage(u => ({ ...u, used: u.used + 1 })); }
  function handleNeedAuth() { setShowAuthGate(true); }

  // Show auth gate if not authenticated
  if (!auth || showAuthGate) {
    return <AuthGate onAuth={handleAuth} />;
  }

  function renderPage() {
    const props = { auth, usage, onUsed: handleUsed };
    switch (page) {
      case 'home':     return <HomePage {...props} onPage={setPage} />;
      case 'monitor':  return <MonitorPage {...props} />;
      case 'factory':  return <FactoryPage {...props} />;
      case 'publish':  return <PublishPage auth={auth} />;
      case 'analytics':return <AnalyticsPage />;
      case 'ip':       return <IPPage />;
      case 'account':  return <AccountPage />;
      case 'topics':   return <TopicsPage />;
      case 'optimize': return <OptimizePage auth={auth} onUsed={handleUsed} />;
      case 'monetize': return <MonetizePage />;
      case 'apis':     return <ApisPage />;
      default:         return <HomePage {...props} onPage={setPage} />;
    }
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Header auth={auth} usage={usage} onLogout={handleLogout} />
      <div style={{display:'flex',flex:1}}>
        <Sidebar page={page} onPage={setPage} />
        <main style={{flex:1,overflowY:'auto',maxHeight:'calc(100vh - 56px)'}}>
          {auth.type === 'guest' && usage.used >= GUEST_LIMIT ? (
            <UsageGate auth={auth} usage={usage} onNeedAuth={handleNeedAuth}>
              {renderPage()}
            </UsageGate>
          ) : renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
