/* ── AI provider endpoints ── */

  deepseek:'https://api.deepseek.com/v1/chat/completions',
  moonshot:'https://api.moonshot.cn/v1/chat/completions',
  zhipu:'https://open.bigmodel.cn/api/paas/v4/chat/completions',
  qwen:'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
  doubao:'https://ark.cn-beijing.volces.com/api/v3/chat/completions',
};

/* 从 apiKeys 提取当前激活的 provider 配置 */
function getAI(apiKeys){
  const p=apiKeys?.provider||'zhipu';
  const map={
    deepseek:{provider:'deepseek',key:apiKeys?.deepseek,model:apiKeys?.deepseekModel||'deepseek-chat'},
    moonshot:{provider:'moonshot',key:apiKeys?.moonshot,model:apiKeys?.moonshotModel||'moonshot-v1-8k'},
    zhipu:{provider:'zhipu',key:apiKeys?.zhipu,model:apiKeys?.zhipuModel||'glm-4-flash'},
    qwen:{provider:'qwen',key:apiKeys?.qwen,model:apiKeys?.qwenModel||'qwen-turbo'},
    doubao:{provider:'doubao',key:apiKeys?.doubao,model:apiKeys?.doubaoModel||'doubao-pro-32k'},
    claude:{provider:'claude',key:apiKeys?.claude,model:apiKeys?.claudeModel||'claude-haiku-4-5-20251001'},
  };
  return map[p]||map.zhipu;
}

/* ── 统一流式 AI 调用（支持 Claude 和所有国内 OpenAI 兼容 API）── */
async function streamAI(cfg,sys,user,onChunk){
  const{provider,key,model}=cfg;
  if(!key)throw new Error('请先在「API设置」配置 API Key');
  const r=await fetch('/api/proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({provider,apiKey:key,model,system:sys,user})
  });
  if(!r.ok){
    let msg='API错误 '+r.status;
    try{const err=await r.json();msg=err.error||msg;}catch{}
    throw new Error(msg);
  }
  const reader=r.body.getReader(),dec=new TextDecoder();let full='',buf='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value);
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const l of lines){
      if(!l.startsWith('data: '))continue;
      const raw=l.slice(6).trim();
      if(!raw||raw==='[DONE]')continue;
      try{
        const d=JSON.parse(raw);
        const text=d.delta?.text||d.choices?.[0]?.delta?.content;
        if(text){full+=text;if(onChunk)onChunk(full);}
      }catch{}
    }
  }
  return full;
}

function IPWizard({persona,setPersona,apiKeys,onDone}){
  const [phase,setPhase]=useState(persona?'result':'choose');
  const [selId,setSelId]=useState(persona?.presetId||null);
  const [q,setQ]=useState({});
  const [customData,setCustomData]=useState({background:'',target:'',style:'',products:'',hook:''});
  const [loading,setLoading]=useState(false);
  const [streaming,setStreaming]=useState('');

  const allProfs=PROFESSIONS.flatMap(c=>c.items);
  const selProf=allProfs.find(p=>p.id===selId);

  const QUESTIONS=[
    {k:'q1',label:'你最擅长什么、最感兴趣什么？',ph:'比如：7年做保险、心理学专业、一边带娃一边赚钱...'},
    {k:'q2',label:'你最想帮助谁？他们最头疼什么？',ph:'比如：想买保险但看不懂的上班族、想做副业没方向的宝妈...'},
    {k:'q3',label:'你最终想卖什么？',ph:'比如：保险服务、理财课程、穿搭咨询、工具订阅...'},
    {k:'q4',label:'你希望别人提到你时，第一个想到什么？',ph:'比如：靠谱的保险顾问、帮我省了好多钱、讲心理学特别接地气...'},
  ];

  const generate=async()=>{
    const cfg=getAI(apiKeys);
    if(!cfg.key){alert('请先在「API设置」配置 API Key');return;}
    setLoading(true);setStreaming('');setPhase('loading');
    const isCustom=selId==='custom';
    const context=isCustom
      ?`背景：${customData.background}\n目标用户：${customData.target}\n风格：${customData.style}\n变现方式：${customData.products}`
      :`职业/方向：${selProf?.n}（${selProf?.h}）\n补充：${Object.values(q).filter(Boolean).join('；')}`;

    const prompt=`你是顶级个人IP顾问。根据以下信息，为这位内容创作者设计独特IP人设档案。

${context}

输出 JSON（只输出JSON，不要其他）：
{
  "tagline": "一句话定位（20字内，有记忆点，带情感）",
  "target": "精准目标用户（一句话，有温度）",
  "pain": "目标用户最大痛点（一句话，准确戳心）",
  "style": "内容风格（20字内，具体不泛泛）",
  "hook": "吸引关注的钩子句（一句有冲击力的话）",
  "pillars": ["内容支柱1（具体）","内容支柱2","内容支柱3"],
  "products": "变现产品由低到高3个（具体）",
  "personality": ["独特标签1","独特标签2","独特标签3"],
  "avoid": "绝对不能做的事（一句话）",
  "opening_line": "见面时自我介绍的第一句话（真实口语化）"
}`;
    try{
      const result=await streamAI(cfg,
        '你是个人IP顾问。只输出JSON，不要其他文字。',prompt,t=>setStreaming(t));
      const m=result.match(/\{[\s\S]*\}/);
      if(m){
        const data=JSON.parse(m[0]);
        const p={presetId:selId,name:selProf?.n||'我的IP',...data};
        setPersona(p);setPhase('result');
      }else throw new Error('未能解析JSON');
    }catch(e){alert('生成失败：'+e.message);setPhase(selId==='custom'?'custom':'questions');}
    setLoading(false);
  };

  if(phase==='result'&&persona){
    const prof=allProfs.find(p=>p.id===persona.presetId);
    return(
      <div style={{maxWidth:700,margin:'0 auto'}}>
        <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:24}}>
          <span style={{fontSize:42,flexShrink:0}}>{prof?.e||'✨'}</span>
          <div style={{flex:1}}>
            <h2 style={{fontSize:22,fontWeight:900,marginBottom:4}}>{persona.tagline}</h2>
            <p style={{color:'#8888aa',fontSize:14}}>{persona.target}</p>
          </div>

function Topics({persona,apiKeys,topics,setTopics}){
  const [plat,setPlat]=useState('小红书');
  const [competitor,setCompetitor]=useState('');
  const [direction,setDirection]=useState('');
  const [count,setCount]=useState(20);
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('');
  const [filter,setFilter]=useState('全部');
  const [manualTitle,setManualTitle]=useState('');

  const gen=async()=>{
    const cfg=getAI(apiKeys);
    if(!cfg.key){alert('请先在「API设置」配置 API Key');return;}
    if(!persona){alert('请先完成 IP 定位');return;}
    setLoading(true);setStatus('');
    const p=CONTENT_TYPES.find(c=>c.id==='topic30');
    const prompt=p.build({...persona,name:persona.tagline||persona.name},plat);
    const fullPrompt=`${prompt}
补充信息：
- 对标账号参考风格：${competitor||'无'}
- 具体内容方向：${direction||'通用'}
- 需要数量：${count}个`;
    try{
      const raw=await streamAI(cfg,p.sys,fullPrompt,t=>setStatus(t));
      const m=raw.match(/\[[\s\S]*\]/);
      if(m){
        const arr=JSON.parse(m[0]);
        const newT=arr.slice(0,count).map(t=>({...t,id:Date.now()+Math.random(),platform:plat,status:'待生产',createdAt:new Date().toISOString()}));
        setTopics(prev=>[...prev,...newT]);
        setStatus(`✅ 成功生成 ${newT.length} 个选题！`);
      }
    }catch(e){alert('生成失败：'+e.message);}
    setLoading(false);
  };

  const addManual=()=>{
    if(!manualTitle.trim())return;
    setTopics(prev=>[...prev,{id:Date.now(),title:manualTitle,platform:plat,type:'待定',potential:'中',status:'待生产',createdAt:new Date().toISOString()}]);
    setManualTitle('');
  };

  const del=id=>setTopics(t=>t.filter(x=>x.id!==id));
  const upd=(id,s)=>setTopics(t=>t.map(x=>x.id===id?{...x,status:s}:x));
  const filtered=filter==='全部'?topics:topics.filter(t=>t.status===filter||t.type===filter||t.platform===filter);

  return(
    <div style={{maxWidth:740,margin:'0 auto'}}>
      <h2 className="section-title">💡 第三步：建立选题库</h2>
      <p className="section-sub">AI批量生成选题，再也不愁没内容写</p>

      <div className="card" style={{padding:20,marginBottom:20}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:5}}>发布平台</div>
            <select value={plat} onChange={e=>setPlat(e.target.value)}>
              {['小红书','公众号','视频号','抖音','YouTube'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:5}}>生成数量</div>
            <select value={count} onChange={e=>setCount(Number(e.target.value))}>
              {[10,20,30,50].map(n=><option key={n} value={n}>{n}个</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:5}}>参考对标账号（可选）</div>
            <input placeholder="填入对标账号名，让AI学习其风格" value={competitor} onChange={e=>setCompetitor(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:5}}>细分内容方向（可选）</div>
            <input placeholder="比如：保险科普、理财入门、宝妈副业" value={direction} onChange={e=>setDirection(e.target.value)}/>
          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <button className="btn btn-primary" disabled={loading||!persona} onClick={gen}>
            {loading?'⚙️ 生成中...':'⚡ AI 批量生成选题'}
          </button>
          {status&&!loading&&<span style={{fontSize:12,color:'#4ade80'}}>{status.startsWith('✅')?status:''}</span>}
        </div>

        <div className="divider"/>
        <div style={{fontSize:12,color:'#aaa',marginBottom:8}}>或者手动添加</div>
        <div style={{display:'flex',gap:8}}>
          <input placeholder="手动输入一个选题标题..." value={manualTitle} onChange={e=>setManualTitle(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addManual()} style={{flex:1}}/>
          <button className="btn btn-ghost btn-sm" onClick={addManual} style={{flexShrink:0}}>添加</button>
        </div>
      </div>

      {topics.length>0&&(
        <>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
            {['全部','待生产','已完成','收藏型','转发型','评论型'].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{padding:'4px 12px',borderRadius:999,fontSize:12,cursor:'pointer',border:'none',
                  background:filter===f?'#f97316':'rgba(255,255,255,0.08)',color:filter===f?'#fff':'#8888aa',fontFamily:'inherit'}}>
                {f}{f==='全部'?` (${topics.length})`:''}
              </button>
            ))}
            <button onClick={()=>{if(confirm('清空所有选题？'))setTopics([])}}
              style={{padding:'4px 12px',borderRadius:999,fontSize:12,cursor:'pointer',border:'none',
                background:'rgba(239,68,68,0.15)',color:'#f87171',fontFamily:'inherit',marginLeft:'auto'}}>清空</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {filtered.map(t=>(
              <div key={t.id} className="card" style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:9}}>
                <span style={{fontSize:14}}>{t.potential==='高'?'🔥':'⭐'}</span>
                <span className={`plat ${PLAT_STYLE[t.platform]||'plat-sph'}`}>{t.platform}</span>
                {t.type&&t.type!=='待定'&&<span className={`tag ${t.type==='收藏型'?'t-bl':t.type==='转发型'?'t-pk':'t-gr'}`} style={{fontSize:10}}>{t.type}</span>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                  {t.hook&&<div style={{fontSize:11,color:'#666',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.hook}</div>}
                </div>
                <select value={t.status} onChange={e=>upd(t.id,e.target.value)}
                  style={{width:'auto',fontSize:11,padding:'3px 8px',flex:'none'}}>
                  {['待生产','生产中','已完成','已发布'].map(s=><option key={s}>{s}</option>)}
                </select>
                <button onClick={()=>del(t.id)} style={{background:'none',border:'none',color:'#444',cursor:'pointer',fontSize:13,padding:'0 4px'}}>✕</button>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ══════════════════ STEP 4: Factory ══════════════════ */
function Factory({persona,topics,apiKeys,onSave}){
  const [ctId,setCtId]=useState('xhs');
  const [topic,setTopic]=useState('');
  const [topicSrc,setTopicSrc]=useState('manual');
  const [humanize,setHumanize]=useState(true);
  const [output,setOutput]=useState('');
  const [loading,setLoading]=useState(false);
  const [batchMode,setBatchMode]=useState(false);
  const [batchText,setBatchText]=useState('');
  const [batchRes,setBatchRes]=useState([]);
  const [batchLoading,setBatchLoading]=useState(false);
  const outRef=useRef(null);

  const ct=CONTENT_TYPES.find(c=>c.id===ctId);

  const run=async()=>{
    const cfg=getAI(apiKeys);
    if(!cfg.key){alert('请先在「API设置」配置 API Key');return;}
    const finalTopic=topic.trim();
    if(!finalTopic){alert('请输入选题');return;}
    setLoading(true);setOutput('');
    const p=persona||{tagline:'内容创作者',style:'真实自然',target:'普通读者',products:'课程',hook:'',pillars:[]};
    const userPrompt=ct.build(p,finalTopic,humanize);
    const sysPrompt=ct.sys+(humanize?'\n【去AI感】：避免完美排版，加口语停顿，像真人写的。':'');
    try{
      const result=await streamAI(cfg,sysPrompt,userPrompt,t=>{setOutput(t);if(outRef.current)outRef.current.scrollTop=outRef.current.scrollHeight;});
      onSave({platform:ct.plat,topic:finalTopic,type:ct.name,persona:p.tagline||'',content:result,createdAt:new Date().toISOString()});
    }catch(e){alert('生成失败：'+e.message);}
    setLoading(false);
  };

  const runBatch=async()=>{
    const cfg=getAI(apiKeys);
    if(!cfg.key){alert('请先在「API设置」配置 API Key');return;}
    const tList=batchText.split('\n').filter(t=>t.trim());
    if(!tList.length)return;
    setBatchLoading(true);setBatchRes([]);
    const p=persona||{tagline:'内容创作者',style:'真实自然',target:'普通读者',products:'课程'};
    for(const t of tList){
      try{
        const r=await streamAI(cfg,ct.sys,ct.build(p,t,humanize),null);
        setBatchRes(prev=>[...prev,{topic:t,content:r,status:'done'}]);
        onSave({platform:ct.plat,topic:t,type:ct.name,persona:p.tagline||'',content:r,createdAt:new Date().toISOString()});
      }catch(e){setBatchRes(prev=>[...prev,{topic:t,content:'',status:'error',error:e.message}]);}
      await new Promise(r=>setTimeout(r,600));
    }
    setBatchLoading(false);
  };

  return(
    <div style={{maxWidth:800,margin:'0 auto'}}>
      <h2 className="section-title">🏭 第四步：内容工厂</h2>
      <p className="section-sub">选好类型填入选题，AI自动生产 — 每篇都有「去AI感」处理，读起来像真人写的</p>

      {/* Content type selector */}
      <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:16}}>
        {CONTENT_TYPES.map(c=>(
          <button key={c.id} onClick={()=>setCtId(c.id)}
            className={`btn btn-sm ${ctId===c.id?'btn-primary':'btn-ghost'}`} style={{fontSize:12}}>
            {c.icon} {c.name}
          </button>

            {CHS.map(c=><option key={c}>{c}</option>)}

          <input type="number" placeholder="金额（元）" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} style={{marginBottom:10}}/>
          <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={{marginBottom:10}}/>
          <input placeholder="备注（可选）" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} style={{marginBottom:12}}/>

        </div>

          <div style={{fontWeight:700,marginBottom:14}}>📊 渠道分布</div>

            Object.entries(byCh).sort((a,b)=>b[1]-a[1]).map(([ch,amt])=>(
              <div key={ch} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span>{ch}</span><span style={{color:'#4ade80'}}>¥{amt.toLocaleString()}</span>

                <div style={{height:4,background:'rgba(255,255,255,0.08)',borderRadius:2}}>
                  <div style={{height:'100%',width:`${(amt/total*100).toFixed(0)}%`,background:'linear-gradient(90deg,#f97316,#ec4899)',borderRadius:2}}/>

        </div>
      </div>
      <div className="card" style={{padding:18,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:14}}>🗺️ 变现路径（由易到难）</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>

        <div>

              <button onClick={()=>setRecords(records.filter(x=>x.id!==r.id))} style={{background:'none',border:'none',color:'#444',cursor:'pointer'}}>✕</button>

          ))}
        </div>
      )}
    </div>
  );
}

    moonshotModel:'moonshot-v1-8k',
    doubao:'f45f405d-4706-433e-8b2a-d995d52d39a1',
    doubaoModel:'doubao-pro-32k',

    qwen:'',

    jimeng:'f45f405d-4706-433e-8b2a-d995d52d39a1',
  }));
  const [done,setDone]=useState(()=>LS.g('done_v3',[]));

  useEffect(()=>LS.s('persona_v3',persona),[persona]);
  useEffect(()=>LS.s('topics_v3',topics),[topics]);
  useEffect(()=>LS.s('history_v3',history),[history]);
  useEffect(()=>LS.s('apikeys_v3',apiKeys),[apiKeys]);
  useEffect(()=>LS.s('done_v3',done),[done]);

  const markDone=id=>{if(!done.includes(id))setDone(p=>[...p,id]);};
  const savePersona=p=>{setPersona(p);markDone('ip');};
  const saveHistory=item=>setHistory(p=>[...p.slice(-499),item]);
  const go=id=>{setPage(id);window.scrollTo(0,0);};

  const render=()=>{
    switch(page){
      case 'home': return <Home setPage={go} persona={persona} done={done} history={history}/>;
      case 'ip':   return <IPWizard persona={persona} setPersona={savePersona} apiKeys={apiKeys} onDone={()=>{markDone('ip');go('account');}}/>;
      case 'account': return <AccountSetup persona={persona} apiKeys={apiKeys}/>;
      case 'topics':  return <Topics persona={persona} apiKeys={apiKeys} topics={topics} setTopics={t=>{setTopics(t);markDone('topics');}}/>;

      case 'publish': return <Publish/>;
      case 'analytics': return <Analytics/>;
      case 'optimize':  return <Optimize history={history} persona={persona} apiKeys={apiKeys}/>;
      case 'monetize':  return <Monetize/>;
      case 'apis': return <APISettings apiKeys={apiKeys} setApiKeys={k=>{setApiKeys(k);LS.s('apikeys_v3',k);}}/>;
      default: return null;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={go} persona={persona} apiKeys={apiKeys} done={done}/>
      <div className="main">
        <div style={{maxWidth:860,margin:'0 auto',padding:'30px 24px'}}>
          {render()}
        </div>
      </div>
    </div>
  );
}
